<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM | Central Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0e11;
            --bg-card: #1e2329;
            --brand-yellow: #f0b90b;
            --stock-green: #0ecb81;
            --stock-red: #f6465d;
            --border-gray: #363a45;
        }

        body {
            background-color: var(--bg-main);
            color: #eaecef;
            font-family: 'JetBrains Mono', monospace;
            background-image: radial-gradient(circle at 2px 2px, #1e2329 1px, transparent 0);
            background-size: 40px 40px;
        }

        .stat-card { background: var(--bg-card); border: 1px solid var(--border-gray); }
        .input-field { background: #0b0e11; border: 1px solid var(--border-gray); color: white; padding: 12px; width: 100%; outline: none; font-size: 0.75rem; }
        .input-field:focus { border-color: var(--brand-yellow); }
        
        .btn-primary { background: var(--brand-yellow); color: black; font-weight: bold; padding: 12px 20px; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }
        .btn-danger { background: var(--stock-red); color: white; font-weight: bold; padding: 12px 20px; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }

        .auth-step { display: none; }
        .auth-step.active { display: block; }
        .hidden-terminal { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div id="login-screen" class="max-w-md w-full stat-card p-8 border-t-4 border-t-[#f0b90b]">
        <div id="step-1" class="auth-step active">
            <h2 class="text-xs font-bold mb-4 uppercase text-gray-500">Gate 1</h2>
            <input type="password" id="pass-1" class="input-field mb-4" placeholder="KEY 1...">
            <button onclick="verifyStep(1)" class="btn-primary w-full">Verify</button>
        </div>
        <div id="step-2" class="auth-step">
            <h2 class="text-xs font-bold mb-4 uppercase text-gray-500">Gate 2</h2>
            <input type="password" id="pass-2" class="input-field mb-4" placeholder="KEY 2...">
            <button onclick="verifyStep(2)" class="btn-primary w-full">Verify</button>
        </div>
        <div id="step-3" class="auth-step">
            <h2 class="text-xs font-bold mb-4 uppercase text-gray-500">Root Key</h2>
            <input type="password" id="pass-3" class="input-field mb-4" placeholder="FINAL KEY...">
            <button onclick="verifyStep(3)" class="btn-primary w-full">Access Console</button>
        </div>
    </div>

    <div id="admin-console" class="max-w-4xl w-full hidden-terminal space-y-6">
        <header class="flex justify-between items-center border-b border-[#363a45] pb-4">
            <h1 class="text-xl font-bold uppercase">System<span class="text-[#f0b90b]">Override</span></h1>
            <button onclick="location.reload()" class="text-[10px] text-gray-500 underline uppercase">Lock Session</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="stat-card p-6">
                <h3 class="text-xs font-bold text-gray-500 uppercase mb-4">Site Lockdown</h3>
                <p class="text-[10px] text-gray-400 mb-4">Requires password for all users to view any page.</p>
                <button id="lock-toggle" onclick="toggleSiteLock()" class="btn-danger w-full">Enable Lockdown</button>
            </div>

            <div class="stat-card p-6">
                <h3 class="text-xs font-bold text-gray-500 uppercase mb-4">Global Broadcast</h3>
                <input type="text" id="broadcast-input" class="input-field mb-2" placeholder="Enter message...">
                <div class="flex space-x-2">
                    <button onclick="setBroadcast()" class="btn-primary flex-1">Update</button>
                    <button onclick="clearBroadcast()" class="bg-gray-700 text-xs px-4">Clear</button>
                </div>
            </div>
        </div>

        <div class="stat-card p-6">
            <div class="flex justify-between items-center">
                <div>
                    <h3 class="text-xs font-bold text-gray-500 uppercase">Maintenance Mode</h3>
                    <p class="text-[10px] text-gray-400">Adds visual warning and slows down animations.</p>
                </div>
                <button id="maint-toggle" onclick="toggleMaint()" class="bg-gray-700 text-xs px-6 py-2 font-bold uppercase">Disabled</button>
            </div>
        </div>
    </div>

    <script>
        const KEYS = { step1: "alpha", step2: "beta", step3: "root123" };
        let currentStep = 1;

        function verifyStep(step) {
            const val = document.getElementById(`pass-${step}`).value;
            if (val === KEYS[`step${step}`]) {
                if (step < 3) {
                    document.getElementById(`step-${step}`).classList.remove('active');
                    currentStep++;
                    document.getElementById(`step-${currentStep}`).classList.add('active');
                } else {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('admin-console').classList.remove('hidden-terminal');
                    refreshUI();
                }
            } else { location.reload(); }
        }

        // FEATURE ACTIONS
        function toggleSiteLock() {
            const current = localStorage.getItem('siteLocked') === 'true';
            localStorage.setItem('siteLocked', !current);
            refreshUI();
        }

        function toggleMaint() {
            const current = localStorage.getItem('maintMode') === 'true';
            localStorage.setItem('maintMode', !current);
            refreshUI();
        }

        function setBroadcast() {
            const msg = document.getElementById('broadcast-input').value;
            localStorage.setItem('globalBroadcast', msg);
            alert("Broadcast Updated Globally");
        }

        function clearBroadcast() {
            localStorage.removeItem('globalBroadcast');
            document.getElementById('broadcast-input').value = "";
            alert("Broadcast Cleared");
        }

        function refreshUI() {
            const lockBtn = document.getElementById('lock-toggle');
            const maintBtn = document.getElementById('maint-toggle');

            const isLocked = localStorage.getItem('siteLocked') === 'true';
            const isMaint = localStorage.getItem('maintMode') === 'true';

            lockBtn.innerText = isLocked ? "UNLOCK WEBSITE" : "ENABLE LOCKDOWN";
            lockBtn.className = isLocked ? "btn-primary w-full" : "btn-danger w-full";

            maintBtn.innerText = isMaint ? "ENABLED" : "DISABLED";
            maintBtn.className = isMaint ? "bg-[#f0b90b] text-black text-xs px-6 py-2 font-bold uppercase" : "bg-gray-700 text-xs px-6 py-2 font-bold uppercase";
        }
    </script>
</body>
</html>
