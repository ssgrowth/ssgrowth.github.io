<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM | Multi-Layer Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0e11;
            --bg-card: #1e2329;
            --brand-yellow: #f0b90b;
            --stock-green: #0ecb81;
            --stock-red: #f6465d;
            --border-gray: #363a45;
        }

        body {
            background-color: var(--bg-main);
            color: #eaecef;
            font-family: 'JetBrains Mono', monospace;
            background-image: radial-gradient(circle at 2px 2px, #1e2329 1px, transparent 0);
            background-size: 40px 40px;
            transition: border 0.3s ease;
        }

        .stat-card { background: var(--bg-card); border: 1px solid var(--border-gray); }
        .input-field { background: #0b0e11; border: 1px solid var(--border-gray); color: white; padding: 12px; width: 100%; outline: none; font-size: 0.75rem; }
        .input-field:focus { border-color: var(--brand-yellow); }
        
        .btn-primary { background: var(--brand-yellow); color: black; font-weight: bold; padding: 12px 20px; transition: all 0.2s; cursor: pointer; }
        .btn-primary:hover { filter: brightness(1.1); }

        .auth-step { display: none; }
        .auth-step.active { display: block; }
        
        .step-indicator { height: 4px; flex-grow: 1; background: var(--border-gray); transition: background 0.3s; }
        .step-indicator.complete { background: var(--brand-yellow); }

        .hidden-terminal { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div id="login-screen" class="max-w-md w-full stat-card p-8 border-t-4 border-t-[#f0b90b]">
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center space-x-2">
                <div class="w-3 h-3 bg-[#f0b90b] rotate-45"></div>
                <h1 class="text-xs font-bold uppercase tracking-widest">Auth_Sequence</h1>
            </div>
            <span id="step-counter" class="text-[10px] text-gray-500 font-bold">STEP 1/3</span>
        </div>

        <div class="flex space-x-2 mb-8">
            <div id="bar-1" class="step-indicator complete"></div>
            <div id="bar-2" class="step-indicator"></div>
            <div id="bar-3" class="step-indicator"></div>
        </div>

        <div id="step-1" class="auth-step active">
            <p class="text-[10px] text-gray-500 uppercase mb-2">Primary Gate</p>
            <input type="password" id="pass-1" class="input-field mb-4" placeholder="FIRST KEY...">
            <button onclick="verifyStep(1)" class="btn-primary w-full text-xs uppercase">Continue</button>
        </div>

        <div id="step-2" class="auth-step">
            <p class="text-[10px] text-gray-500 uppercase mb-2">Secondary Encryption</p>
            <input type="password" id="pass-2" class="input-field mb-4" placeholder="SECOND KEY...">
            <button onclick="verifyStep(2)" class="btn-primary w-full text-xs uppercase">Decrypt</button>
        </div>

        <div id="step-3" class="auth-step">
            <p class="text-[10px] text-gray-500 uppercase mb-2">True Root Access</p>
            <input type="password" id="pass-3" class="input-field mb-4" placeholder="FINAL KEY...">
            <button onclick="verifyStep(3)" class="btn-primary w-full text-xs uppercase">Initialize</button>
        </div>

        <p id="error-msg" class="text-[10px] text-[#f6465d] mt-4 uppercase hidden text-center font-bold">Sequence Fault: Authentication Reset</p>
    </div>

    <div id="admin-console" class="max-w-5xl w-full hidden-terminal space-y-6">
        <header class="flex justify-between items-end border-b border-[#363a45] pb-4">
            <div>
                <h1 class="text-2xl font-bold uppercase tracking-tighter">System<span class="text-[#f0b90b]">Management</span></h1>
                <p class="text-[10px] text-[#0ecb81] uppercase font-bold">Status: Logged as SYSTEM_ROOT</p>
            </div>
            <button onclick="location.reload()" class="text-[10px] text-[#f6465d] underline uppercase font-bold">Terminate Session</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="stat-card p-6 border-l-2 border-[#f0b90b]">
                <h3 class="text-[10px] text-gray-500 uppercase mb-4">Maintenance Mode</h3>
                <div class="flex items-center justify-between">
                    <span id="maint-status" class="text-xs font-bold text-gray-400">INACTIVE</span>
                    <button onclick="toggleMaint()" class="bg-gray-800 text-[10px] px-3 py-1 font-bold rounded">TOGGLE</button>
                </div>
            </div>
            
            <div class="stat-card p-6 border-l-2 border-[#0ecb81]">
                <h3 class="text-[10px] text-gray-500 uppercase mb-4">Traffic Flow</h3>
                <p class="text-xl font-bold">1.2k <span class="text-[10px] text-gray-500">req/s</span></p>
            </div>

            <div class="stat-card p-6 border-l-2 border-[#f6465d]">
                <h3 class="text-[10px] text-gray-500 uppercase mb-4">Active Threats</h3>
                <p class="text-xl font-bold text-[#f6465d]">0</p>
            </div>
        </div>

        <div class="stat-card p-6">
            <h2 class="text-xs font-bold uppercase text-gray-400 mb-4 tracking-widest">Global Broadcast Control</h2>
            <div class="flex space-x-4">
                <input type="text" id="alert-input" class="input-field" placeholder="Enter emergency alert text...">
                <button onclick="alert('Broadcast Deployed')" class="btn-primary text-xs uppercase px-8">Push</button>
            </div>
        </div>
    </div>

    <script>
        // TRIPLE KEY CONFIGURATION
        const KEYS = {
            step1: "njw37WGPaNmz9hX3APBa6TdQCWw0pqNhpa7Xrr/DwMpl8M5jxd0EbbXOIjNeYqR829cooTe1nUmKdeKIT2ASRDNZ7ZOOWyzu+VNJLFAYSnOgd9Sc0P02G/H4AClmfbyrXnh6h0KaElo6erS86pIDIM72qy1ddbHvxo867b7UlHQnuoceNvEuxNtOpVzVLzFIyiIsJxaa9zv+vJ9u5ffNSQ==",      // First password
            step2: "nU0I++Unzmvq93zgfIasn3tGl8Jo6Agb5Kg1rdx1Jc82bYypQg0Sclxg+rJMSvLBErhUxOXIjePZvlz2ES93SO4njHkNx8PGX9+72of9wCwlIVbKEdk85XH5GorxcmKrvdFJCqpt9DrhbPJAZyZTwumzcV1Pzdq5w3Rq62tkzFkzLM7S1eWOZTYYJSqrwddxv1b505KcyE0nkz0CA2eaQQ==",       // Second password
            step3: "1@yourslol"     // True password
        };

        let currentStep = 1;

        function verifyStep(step) {
            const input = document.getElementById(`pass-${step}`).value;
            const error = document.getElementById('error-msg');

            if (input === KEYS[`step${step}`]) {
                if (step < 3) {
                    // Move to next step
                    document.getElementById(`step-${step}`).classList.remove('active');
                    currentStep++;
                    document.getElementById(`step-${currentStep}`).classList.add('active');
                    document.getElementById(`bar-${currentStep}`).classList.add('complete');
                    document.getElementById('step-counter').innerText = `STEP ${currentStep}/3`;
                } else {
                    // Final Success
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('admin-console').classList.remove('hidden-terminal');
                }
            } else {
                // Reset on failure
                error.classList.remove('hidden');
                setTimeout(() => {
                    location.reload(); // Full reset for security
                }, 1500);
            }
        }

        let maintActive = false;
        function toggleMaint() {
            maintActive = !maintActive;
            const statusText = document.getElementById('maint-status');
            if(maintActive) {
                statusText.innerText = "ACTIVE";
                statusText.className = "text-xs font-bold text-[#f0b90b]";
                document.body.style.border = "4px solid var(--brand-yellow)";
            } else {
                statusText.innerText = "INACTIVE";
                statusText.className = "text-xs font-bold text-gray-400";
                document.body.style.border = "none";
            }
        }

        // Handle 'Enter' key for all steps
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if(currentStep <= 3) verifyStep(currentStep);
            }
        });
    </script>
</body>
</html>
