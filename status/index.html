<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM | Global Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0e11;
            --bg-card: #1e2329;
            --brand-yellow: #f0b90b;
            --stock-green: #0ecb81;
            --stock-red: #f6465d;
            --border-gray: #363a45;
        }

        body {
            background-color: var(--bg-main);
            color: #eaecef;
            font-family: 'JetBrains Mono', monospace;
            background-image: radial-gradient(circle at 2px 2px, #1e2329 1px, transparent 0);
            background-size: 40px 40px;
        }

        .stat-card { background: var(--bg-card); border: 1px solid var(--border-gray); position: relative; overflow: hidden; }
        .nav-link { color: #848e9c; transition: color 0.2s; }
        .nav-link:hover { color: var(--brand-yellow); }

        /* Status Pulse Animations */
        .pulse { border-radius: 50%; height: 8px; width: 8px; position: relative; display: inline-block; margin-right: 8px; }
        
        .pulse-green { background: var(--stock-green); box-shadow: 0 0 0 rgba(14, 203, 129, 0.4); animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(14, 203, 129, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(14, 203, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(14, 203, 129, 0); } }

        .pulse-red { background: var(--stock-red); box-shadow: 0 0 0 rgba(246, 70, 93, 0.4); animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(246, 70, 93, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(246, 70, 93, 0); } 100% { box-shadow: 0 0 0 0 rgba(246, 70, 93, 0); } }

        /* Scanning Line Animation */
        .scanline {
            width: 100%; height: 2px; background: rgba(240, 185, 11, 0.1);
            position: absolute; top: 0; left: 0; pointer-events: none;
            animation: scan 4s linear infinite;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--border-gray); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="border-b border-[#363a45] bg-[#181a20] px-6 py-3 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-10">
            <div class="flex items-center space-x-2">
                <div class="w-3 h-3 bg-[#f0b90b] rotate-45"></div>
                <span class="font-bold text-lg tracking-tight uppercase text-white">System<span class="text-[#f0b90b]">Status</span></span>
            </div>
            <div class="hidden lg:flex space-x-8 text-xs font-bold uppercase tracking-widest">
                <a href="/" class="nav-link">/terminal</a>
                <a href="/docs" class="nav-link">/docs</a>
                <a href="/about" class="nav-link">/about</a>
            </div>
        </div>
        <div class="flex items-center space-x-6">
            <p id="global-indicator" class="text-[10px] font-bold text-[#0ecb81]">ALL SYSTEMS OPERATIONAL</p>
        </div>
    </nav>

    <main class="flex-grow p-6 lg:p-12 max-w-[1200px] mx-auto w-full">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="stat-card p-6">
                <div class="scanline"></div>
                <p class="text-gray-500 text-[10px] uppercase font-bold">Total Uptime</p>
                <p class="text-2xl font-bold text-white">99.998%</p>
            </div>
            <div class="stat-card p-6">
                <p class="text-gray-500 text-[10px] uppercase font-bold">Active Incidents</p>
                <p id="incident-count" class="text-2xl font-bold text-[#0ecb81]">0</p>
            </div>
            <div class="stat-card p-6">
                <p class="text-gray-500 text-[10px] uppercase font-bold">Avg Response</p>
                <p class="text-2xl font-bold text-white">0ms</p>
            </div>
        </div>

        <h2 class="text-gray-500 text-[10px] font-bold uppercase mb-4 tracking-[0.3em]">Infrastructure_Nodes</h2>
        <div id="status-container" class="space-y-4">
            </div>

    </main>

    <footer class="bg-[#181a20] border-t border-[#363a45] p-4 text-[10px] flex justify-between items-center text-gray-500">
        <div>AUTO-REFRESH: ENABLED</div>
        <div id="last-updated">LAST_CHECK: --:--:--</div>
    </footer>

    <script>
        /**
         * EASY STATUS CONFIGURATION
         * Set status to: 'ONLINE', 'DEGRADED', or 'OFFLINE'
         */
        const systemNodes = [
            { name: "Core API Gateway", region: "US-EAST", status: "OFFLINE", load: "0%" },
            { name: "Primary Database", region: "EU-WEST", status: "OFFLINE", load: "0%" },
            { name: "Auth Service", region: "GLOBAL", status: "DEGRADED", load: "?%" },
            { name: "CDN Edge Nodes", region: "ASIA-PAC", status: "ONLINE", load: "31%" },
            { name: "Legacy Log Worker", region: "US-WEST", status: "OFFLINE", load: "0%" }
        ];

        function buildStatus() {
            const container = document.getElementById('status-container');
            const globalIndicator = document.getElementById('global-indicator');
            const incidentDisplay = document.getElementById('incident-count');
            let incidents = 0;

            container.innerHTML = ''; // Clear for refresh

            systemNodes.forEach(node => {
                let statusColor = "#0ecb81"; // Green
                let pulseClass = "pulse-green";
                
                if (node.status === "DEGRADED") {
                    statusColor = "#f0b90b"; // Yellow
                    pulseClass = "pulse-yellow"; // Tailwind can handle simple colors
                    incidents++;
                } else if (node.status === "OFFLINE") {
                    statusColor = "#f6465d"; // Red
                    pulseClass = "pulse-red";
                    incidents++;
                }

                const item = document.createElement('div');
                item.className = "stat-card p-5 flex justify-between items-center group hover:bg-[#2b3139] transition-colors";
                item.innerHTML = `
                    <div class="flex items-center">
                        <span class="pulse ${pulseClass}"></span>
                        <div>
                            <p class="text-sm font-bold text-white">${node.name}</p>
                            <p class="text-[10px] text-gray-500 uppercase">${node.region} // LOAD: ${node.load}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] font-bold px-3 py-1 rounded" style="background: ${statusColor}20; color: ${statusColor}">${node.status}</span>
                    </div>
                `;
                container.appendChild(item);
            });

            // Update Header/Totals
            if (incidents > 0) {
                globalIndicator.innerText = "SYSTEM ISSUES DETECTED";
                globalIndicator.className = "text-[10px] font-bold text-[#f6465d]";
                incidentDisplay.innerText = incidents;
                incidentDisplay.className = "text-2xl font-bold text-[#f6465d]";
            }

            document.getElementById('last-updated').innerText = `LAST_CHECK: ${new Date().toLocaleTimeString()}`;
        }

        // Initialize
        buildStatus();
        // Simulate auto-refresh every 30 seconds
        setInterval(buildStatus, 30000);
    </script>
</body>
</html>
