<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM | Documentation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0e11;
            --bg-card: #1e2329;
            --brand-yellow: #f0b90b;
            --stock-green: #0ecb81;
            --border-gray: #363a45;
        }

        body {
            background-color: var(--bg-main);
            color: #eaecef;
            font-family: 'JetBrains Mono', monospace;
            background-image: radial-gradient(circle at 2px 2px, #1e2329 1px, transparent 0);
            background-size: 40px 40px;
        }

        .terminal-border { border-left: 3px solid var(--brand-yellow); }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-gray); }
        .nav-link { color: #848e9c; transition: color 0.2s; }
        .nav-link:hover { color: var(--brand-yellow); }
        
        /* Sidebar active state */
        .doc-link-active { color: var(--brand-yellow); border-right: 2px solid var(--brand-yellow); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--border-gray); border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="border-b border-[#363a45] bg-[#181a20] px-6 py-3 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-10">
            <div class="flex items-center space-x-2">
                <div class="w-3 h-3 bg-[#f0b90b] rotate-45"></div>
                <span class="font-bold text-lg tracking-tight uppercase text-white">System<span class="text-[#f0b90b]">Docs</span></span>
            </div>
            <div class="hidden lg:flex space-x-8 text-xs font-bold uppercase tracking-widest">
                <a href="/" class="nav-link">/terminal</a>
                <a href="/log" class="nav-link">/log</a>
                <a href="/status" class="nav-link">/status</a>
            </div>
        </div>
        <div class="flex items-center space-x-6">
            <div class="text-right">
                <p class="text-[10px] text-gray-500 uppercase">Latency</p>
                <p id="latency-display" class="text-xs text-[#0ecb81] font-bold">--ms</p>
            </div>
        </div>
    </nav>

    <div class="flex flex-grow max-w-[1600px] mx-auto w-full">
        <aside class="w-64 border-r border-[#363a45] p-6 hidden md:block">
            <h3 class="text-gray-500 text-[10px] font-bold uppercase mb-6 tracking-widest">Documentation</h3>
            <nav id="doc-sidebar" class="space-y-4 text-xs font-bold uppercase">
                </nav>
        </aside>

        <main class="flex-grow p-6 lg:p-12 overflow-y-auto">
            <div id="docs-container" class="space-y-12">
                </div>
        </main>
    </div>

    <footer class="bg-[#181a20] border-t border-[#363a45] p-4 text-[10px] flex justify-between items-center text-gray-500">
        <div>&copy; 2026 SYSTEMS ARCHITECTURE // DOCS_MODULE</div>
        <div class="uppercase tracking-widest">Security Clearance: Level 4 Required</div>
    </footer>

    <script>
        /**
         * EASY EDIT SECTION: 
         * Add your information here. Just follow the pattern.
         */
        const myDocumentation = [
            {
                id: "overview",
                title: "System Overview",
                content: "This terminal provides a high-level interface for monitoring global infrastructure. All nodes are connected via a secure, sub-millisecond mesh network."
            },
            {
                id: "connectivity",
                title: "Network Connectivity",
                content: "Primary uplinks are established through US-EAST-CORE. If latency exceeds 200ms, the system will automatically attempt a failover to secondary EU-WEST nodes."
            },
            {
                id: "security",
                title: "Security Protocol",
                content: "All API requests require a valid SHA-256 signed header. Unauthorized access attempts are logged and flagged for immediate firewall blacklisting."
            },
            {
                id: "maintenance",
                title: "Maintenance Schedule",
                content: "Routine database optimization occurs every Sunday at 04:00 UTC. System performance may fluctuate by +/- 5% during this window."
            }
        ];

        // Functions to build the UI automatically
        function buildDocs() {
            const container = document.getElementById('docs-container');
            const sidebar = document.getElementById('doc-sidebar');
            
            myDocumentation.forEach((doc, index) => {
                // Build Sidebar Link
                const link = document.createElement('a');
                link.href = `#${doc.id}`;
                link.className = `block nav-link transition-all ${index === 0 ? 'doc-link-active' : ''}`;
                link.innerText = `/ ${doc.title}`;
                sidebar.appendChild(link);

                // Build Content Section
                const section = document.createElement('section');
                section.id = doc.id;
                section.className = "stat-card p-8 terminal-border";
                section.innerHTML = `
                    <h2 class="text-[#f0b90b] text-xl font-bold mb-4 uppercase tracking-tight">${doc.title}</h2>
                    <p class="text-gray-400 leading-relaxed text-sm">${doc.content}</p>
                    <div class="mt-6 pt-4 border-t border-[#363a45] flex space-x-4">
                         <span class="text-[9px] text-gray-600 italic">REF_ID: ${doc.id.toUpperCase()}_00${index + 1}</span>
                         <span class="text-[9px] text-gray-600 italic">STATUS: VERIFIED</span>
                    </div>
                `;
                container.appendChild(section);
            });
        }

        // Real-time Latency (from previous update)
        async function updateLatency() {
            const display = document.getElementById('latency-display');
            const startTime = Date.now();
            try {
                await fetch('https://www.google.com/generate_204', { mode: 'no-cors' });
                const rtt = Date.now() - startTime;
                display.innerText = `${rtt}.0ms`;
            } catch (e) { display.innerText = "OFFLINE"; }
        }

        // Initialize
        buildDocs();
        updateLatency();
        setInterval(updateLatency, 5000);
    </script>
</body>
</html>
